# Exported from Render on 2026-07-10T17:45:01Z
version: "1"
projects:
- name: My project
  environments:
  - name: Production
    services:
    - type: web
      name: Promotix
      runtime: python
      repo: https://github.com/alokrk04/Promotix
      plan: free
      envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: promotix-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://promotix.in,https://www.promotix.in,https://promotix.netlify.app
      region: oregon
      buildCommand: cd ../frontend && npm install && npm run build && cd ../backend && pip install -r requirements.txt
      startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
      autoDeployTrigger: commit
      rootDir: backend

databases:
- name: promotix-db
  plan: free
  region: oregon
  version: "16"
  postgresMajorVersion: 16
  databaseName: promotix
