services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: promotix-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:///./promotix.db
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-promotix123}
      - JWT_SECRET=${JWT_SECRET:-change-this-to-a-random-secret-key-min-32-chars}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      - PORT=${PORT:-8000}
    volumes:
      - ./backend/promotix.db:/app/promotix.db
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: promotix-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  promotix-db: