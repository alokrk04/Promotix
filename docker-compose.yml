services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: promotix-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:///./promotix.db
    volumes:
      - ./backend/promotix.db:/app/promotix.db
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: promotix-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  promotix-db: